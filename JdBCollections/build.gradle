plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'com.github.josoft'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    withSourcesJar()
    withJavadocJar()
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main']
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
